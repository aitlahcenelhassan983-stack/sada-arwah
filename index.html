<div style="direction: rtl; font-family: 'Amiri', serif; max-width: 600px; margin: 40px auto; position: relative;">

    <style>
        @keyframes pulse-gold {
            0% { transform: scale(1); text-shadow: 0 0 5px rgba(212,175,55,0.2); }
            50% { transform: scale(1.08); text-shadow: 0 0 15px rgba(212,175,55,0.5); }
            100% { transform: scale(1); text-shadow: 0 0 5px rgba(212,175,55,0.2); }
        }
        .masha-allah-badge {
            display: inline-block;
            background: #ffffff;
            padding: 12px 30px;
            border: 2px double #d4af37;
            border-radius: 50px;
            font-size: 1.6em;
            color: #d4af37;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: pulse-gold 3s infinite ease-in-out;
            cursor: default;
        }
    </style>

    <div style="text-align: center; margin-bottom: -25px; position: relative; z-index: 10;">
        <div class="masha-allah-badge">✨ ما شاء الله ✨</div>
    </div>

    <div style="text-align: center; border: 2px solid #28a745; padding: 40px 25px 25px 25px; border-radius: 25px; background-color: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; position: relative;">
        
        <div id="counter-display" style="color: #28a745; font-weight: bold; margin-bottom: 5px; font-size: 1.1em;">الرسالة 1 من 40</div>
        <div id="group-name" style="color: #666; font-size: 0.95em; margin-bottom: 20px; font-style: italic;">كتيبة الأطباء والعلماء (بلسم الشفاء)</div>

        <h2 style="color: #333; margin-top: 5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; font-size: 1.8em;">صدى الأرواح: رسائل المستقبل</h2>
        
        <div id="message-display" style="font-size: 1.5em; min-height: 180px; display: flex; align-items: center; justify-content: center; color: #444; margin: 20px 0; padding: 10px; line-height: 1.8; transition: opacity 1s ease-in-out;">
            <strong>طبيبة جراحة: "أستاذي، المشرط في يدي اليوم يذكرني بدقتك في تصحيح الكود، شكراً لك."</strong>
        </div>

        <div style="width: 100%; background: #f0f0f0; height: 4px; position: absolute; bottom: 0; right: 0;">
            <div id="progress-bar" style="width: 0%; background: #28a745; height: 100%;"></div>
        </div>
    </div>
</div>

<script>
    const messages = [
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "طبيبة جراحة: أستاذي، المشرط في يدي اليوم يذكرني بدقتك في تصحيح الكود، شكراً لك." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "طبيب أطفال: كل طفل أعالجه اليوم، أرى فيه براءة تلميذ كنتُه في قسمك." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "صيدلانية: ركبتُ اليوم دواءً للأمل، تماماً كما كنت تركب لنا الأمل في حصصك." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "عالم أبحاث: المختبر علمني الصبر، وصبرك علينا في (صدى الأرواح) كان أول مختبر لي." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "طبيب نفساني: أفهم اليوم بكاء زميلتي القديم، وأعالج الناس بصدقك الذي علمتنا." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "ممرض: الرفق بالمرضى تعلمته من رفقك بنا وأنت ترصد نقاطنا." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "طبيب أسنان: أرسم الابتسامة اليوم، كما كنت ترسمها بكلمة (ما شاء الله)." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "عالمة فيزياء: الكون محكم القوانين، تماماً كجدولك الذي لم يترك ثغرة للصدفة." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "طبيب طوارئ: سرعة البديهة في إنقاذ الأرواح بدأت من سرعتي في الإجابة بقسمك." },
        { group: "كتيبة الأطباء والعلماء (بلسم الشفاء)", text: "أخصائية تغذية: الغذاء السليم للروح يبدأ من كلمة طيبة من مربٍّ فاضل." },
        
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مهندس برمجيات: أستاذي، أكتب اليوم كوداً عالمياً، لكن (لوجيك) الإكسيل عندك كان هو الأساس." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مهندس معماري: صممتُ برجاً شامخاً، وقواعده تشبه قواعد الانضباط في فصلك." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مهندسة طيران: أحلق فوق السحاب، وأنت من علمني أن الطموح لا سقف له." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مبرمج ذكاء اصطناعي: الآلة تفكر، لكن قلبي ينبض بذكرى أستاذ علمني أن الروح هي الأصل." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مهندس مدني: بناء الجسور مهنتي، وأنت كنت الجسر الذي عبرتُ عليه نحو حلمي." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "محلل بيانات: أرصد النتائج اليوم بدقة، تماماً كما كنت تفعل في العمود L." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مهندس اتصالات: أربط العالم ببعضه، وكلماتك لا تزال تربطني بالماضي الجميل." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "تقني شبكات: شبكة أحلامي لم تنقطع بفضل (الأنتي فيروس) الذي وضعته في عقولنا." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مهندسة طاقة: طاقتي اليوم مستمدة من تشجيعك الذي لم ينطفئ يوماً." },
        { group: "كتيبة المهندسين والمبرمجين (بناة المستقبل)", text: "مصمم جرافيك: أرسم الألوان، وذكرياتي في قسمك هي أجمل لوحة ملونة." },

        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "شاعر: كل قافية أكتبها اليوم، هي صدى لبيت شعري سمعته منك يا أبا علي." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "روائية: قصص نجاحي بدأت من سطر كتبته أنت في دفتري." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "خطاط: جمال حرفي اليوم يحاكي جمال روحك التي علمتنا الخط والخلق." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "رسام: رسمتُ اليوم وجهاً مبتسماً، وسميته (وجه الأستاذ الحسن)." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "صحفي: أنقل الحقيقة بصدق، لأن صدقك في القسم كان درسي الأول." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "مترجمة: أترجم لغات العالم، ولغة قلبك كانت أوضح اللغات." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "ناقد أدبي: أحلل النصوص، وأنت من علمني القراءة بين السطور." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "مخرج أفلام: مشهد تخرجنا اليوم هو أجمل لقطة أخرجتها في حياتي." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "منشد: صوتي يصدح بالقيم، لأن (صدى الأرواح) لا يزال يسكن حنجرتي." },
        { group: "كتيبة الأدباء والفنانين (صدى الأرواح)", text: "مؤلف مسرحي: الحياة مسرح، وأنت علمتنا كيف نؤدي أدوارنا بشرف." },

        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "أستاذ جامعي: أقف أمام طلابي اليوم، وأحاول أن أكون (حسناً) كما كنتَ لي." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "قاضٍ: العدل في محكمتي هو انعكاس لعدلك في توزيع النقاط والاهتمام." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "رجل أعمال: استثماري الأكبر كان في نصائحك التي لا تقدر بثمن." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "محامية: أدافع عن الحق، لأنك علمتنا أن الحق لا يضيع." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "مدرب تنمية: أزرع الأمل في القلوب، وأنت من سقى بذرته في نفسي." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "باحث تاريخي: أوثق الماضي، وذكراك في قلبي هي أصدق وثيقة." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "مدير مدرسة: أدير مؤسستي بروح (ما شاء الله) التي علمتني الإدارة بالحب." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "دبلوماسي: أمثل وطني، وأنت من علمني أن الأخلاق هي خير سفير." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "طيار: أرى العالم صغيراً من الأعلى، وأرى فضلك كبيراً لا يحده أفق." },
        { group: "كتيبة القادة والمربين (خلفاء الحسن)", text: "تلميذ محب: أستاذي الحسن، أنا الآن ما أردتَ لي أن أكون.. شكراً لأنك آمنت بي." }
    ];

    let currentIndex = 0;
    const totalTime = 6500; // الإيقاع الموزون (6.5 ثانية)

    function updateProgressBar() {
        const bar = document.getElementById('progress-bar');
        bar.style.transition = 'none';
        bar.style.width = '0%';
        setTimeout(() => {
            bar.style.transition = `width ${totalTime}ms linear`;
            bar.style.width = '100%';
        }, 50);
    }

    function showNext() {
        const display = document.getElementById('message-display');
        const counter = document.getElementById('counter-display');
        const group = document.getElementById('group-name');

        display.style.opacity = 0;
        
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % messages.length;
            counter.innerText = "الرسالة " + (currentIndex + 1) + " من " + messages.length;
            group.innerText = messages[currentIndex].group;
            display.innerHTML = "<strong>" + messages[currentIndex].text + "</strong>";
            display.style.opacity = 1;
            updateProgressBar();
        }, 1000); 
    }

    updateProgressBar();
    setInterval(showNext, totalTime);
</script>
